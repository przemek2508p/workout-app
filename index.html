<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WORKOUT APP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #121212;
            --card-border: #1c1c1c;
            --accent: #f97316;
            /* Industrial Orange from screenshot */
            --font-main: 'Inter', sans-serif;
            --font-head: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: #ffffff;
            font-family: var(--font-main);
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh;
        }

        h1,
        h2,
        h3 {
            font-family: var(--font-head);
        }

        .exercise-card {
            background: var(--surface);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            transition: background 0.2s;
        }

        .input-field {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 12px;
            padding: 12px 6px;
            width: 100%;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .input-field:focus {
            border-color: var(--accent);
            background: rgba(15, 23, 42, 0.9);
            outline: none;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        .tab-active {
            color: var(--accent);
            position: relative;
        }

        .tab-active {
            color: var(--accent) !important;
        }

        .tab-active::after {
            content: '';
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
        }

        .week-btn {
            transition: all 0.2s;
            background: #111111;
        }

        .week-btn.active {
            background: var(--accent);
            color: #ffffff;
            font-weight: 900;
            box-shadow: 0 4px 15px -1px rgba(249, 115, 22, 0.3);
        }

        .tempo-badge {
            background: #1e1e1e;
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }

        #rest-timer-ui {
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateY(100%);
            opacity: 0;
        }

        #rest-timer-ui.active {
            transform: translateY(0);
            opacity: 1;
        }

        .timer-btn {
            background: #1e1e1e;
            color: white;
            padding: 16px;
            border-radius: 20px;
            font-weight: 700;
            transition: background 0.2s;
        }

        .timer-btn:active {
            background: #262626;
        }

        .sets-tracker {
            transition: opacity 0.5s ease;
        }

        .tracker-fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .timer-progress {
            stroke-dasharray: 283;
            stroke-dashoffset: 283;
            transition: stroke-dashoffset 1s linear;
        }

        @keyframes pulse-red {

            0%,
            100% {
                color: #f87171;
            }

            50% {
                color: #ef4444;
            }
        }

        .timer-finished {
            animation: pulse-red 1s infinite;
        }
    </style>
</head>

<body class="pb-10 bg-[#0a0a0a]">
    <div class="min-h-screen bg-[#0a0a0a]">
        <div class="sticky top-0 z-50 bg-black/95 backdrop-blur-2xl border-b border-neutral-900">
            <header class="max-w-6xl mx-auto px-6 py-5">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h1 class="text-2xl font-black text-white tracking-tight uppercase leading-none">Workout App</h1>
                    </div>
                    <div class="w-2 h-2 rounded-full bg-[#f97316] shadow-[0_0_10px_#f97316]"></div>
                </div>
                <!-- Weeks: static grid with max-width to prevent desktop stretching -->
                <div class="grid grid-cols-8 gap-2 max-w-sm" id="week-selector"></div>
            </header>

            <nav class="bg-black/40 border-t border-neutral-900">
                <div class="max-w-6xl mx-auto grid grid-cols-6">
                    <button onclick="window.app.changeDay('A1')" id="nav-A1"
                        class="py-4 font-black text-[10px] tracking-widest text-neutral-600 uppercase border-r border-neutral-900 last:border-0 tab-active">A1</button>
                    <button onclick="window.app.changeDay('B1')" id="nav-B1"
                        class="py-4 font-black text-[10px] tracking-widest text-neutral-600 uppercase border-r border-neutral-900 last:border-0">B1</button>
                    <button onclick="window.app.changeDay('A2')" id="nav-A2"
                        class="py-4 font-black text-[10px] tracking-widest text-neutral-600 uppercase border-r border-neutral-900 last:border-0">A2</button>
                    <button onclick="window.app.changeDay('B2')" id="nav-B2"
                        class="py-4 font-black text-[10px] tracking-widest text-neutral-600 uppercase border-r border-neutral-900 last:border-0">B2</button>
                    <button onclick="window.app.changeDay('STATS')" id="nav-STATS"
                        class="py-4 font-black text-[10px] tracking-widest text-neutral-600 uppercase border-r border-neutral-900 last:border-0">Stats</button>
                    <button onclick="window.app.changeDay('KALK')" id="nav-KALK"
                        class="py-4 font-black text-[10px] tracking-widest text-neutral-600 uppercase">Kalk</button>
                </div>
            </nav>
        </div>

        <main id="exercise-list" class="max-w-6xl mx-auto p-4 md:p-8 grid grid-cols-1 md:grid-cols-2 gap-6"></main>

        <!-- KALKULATOR VIEW -->
        <div id="calculator-view" class="hidden p-4 space-y-6">
            <div class="exercise-card p-6 text-center">
                <h2 class="text-sky-400 font-black uppercase text-sm mb-4">Kalkulator Ciężarów (% CM)</h2>
                <input type="number" id="cm-input" oninput="window.app.calculateWeights()"
                    class="input-field text-2xl py-4" placeholder="Wpisz CM (np. 85)">
                <div class="grid grid-cols-2 gap-3 mt-6 text-left" id="calc-results"></div>
            </div>
        </div>

        <!-- STATS VIEW -->
        <div id="stats-view" class="hidden p-4 space-y-6">
            <div class="exercise-card p-6">
                <h2 class="text-emerald-400 font-black uppercase text-sm mb-4 text-center">Progres Ćwiczenia</h2>
                <select id="exercise-stat-selector" onchange="window.app.updateExerciseChart()"
                    class="input-field mb-6 text-xs">
                    <option value="">Wybierz ćwiczenie...</option>
                </select>
                <div class="h-48">
                    <canvas id="exerciseChart"></canvas>
                </div>
                <div id="exercise-stats-data" class="mt-4 grid grid-cols-4 gap-1 text-[9px] text-center font-bold">
                </div>
            </div>

            <div class="exercise-card p-6 flex flex-col items-center">
                <h2 class="text-sky-400 font-black uppercase text-sm mb-4">Kopia Zapasowa</h2>
                <button id="export-csv-btn" onclick="window.app.exportToCSV()"
                    class="w-full bg-slate-800 border border-slate-700 py-4 rounded-2xl text-white font-bold flex items-center justify-center gap-3 active:scale-95 transition">
                    <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                        </path>
                    </svg>
                    Eksportuj do CSV
                </button>
                <p class="text-[9px] text-slate-500 mt-3 text-center uppercase tracking-tighter">Pobierz wszystkie dane
                    treningowe do pliku Excel/CSV</p>
            </div>
        </div>


        <button onclick="window.app.toggleTimerUI()"
            class="fixed bottom-8 right-8 w-16 h-16 bg-[#f97316] rounded-2xl shadow-2xl flex items-center justify-center z-[80] transition shadow-orange-500/20">
            <svg class="w-8 h-8 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                    d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
        </button>

        <div id="rest-timer-ui-overlay" onclick="if(event.target === this) window.app.toggleTimerUI()"
            class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[85] hidden"></div>
        <div id="rest-timer-ui"
            class="fixed bottom-0 left-0 right-0 bg-slate-900/95 backdrop-blur-xl border-t border-slate-700 rounded-t-[32px] p-8 z-[90] shadow-2xl pb-12">
            <div class="w-12 h-1.5 bg-slate-700 rounded-full mx-auto mb-8 cursor-pointer"
                onclick="window.app.toggleTimerUI()"></div>
            <div class="flex flex-col items-center">
                <div class="relative w-48 h-48 flex items-center justify-center mb-8 mx-auto text-center">
                    <svg class="w-full h-full -rotate-90">
                        <circle cx="96" cy="96" r="88" stroke="currentColor" stroke-width="8" fill="transparent"
                            class="text-slate-800" />
                        <circle id="timer-progress-bar" cx="96" cy="96" r="88" stroke="currentColor" stroke-width="8"
                            fill="transparent" class="text-[#f97316] timer-progress" stroke-linecap="round" />
                    </svg>
                    <div id="timer-display" class="absolute text-5xl font-black text-white tabular-nums">0:00</div>
                </div>
                <div class="grid grid-cols-4 gap-3 w-full max-w-sm mb-4 mx-auto">
                    <button onclick="window.app.startPreset(60)" class="timer-btn text-xs">60s</button>
                    <button onclick="window.app.startPreset(120)" class="timer-btn text-xs">120s</button>
                    <button onclick="window.app.startPreset(180)" class="timer-btn text-xs">180s</button>
                    <button onclick="window.app.startPreset(300)" class="timer-btn text-xs">300s</button>
                </div>
                <div class="w-full max-w-sm mb-8 mx-auto flex items-center gap-3">
                    <input type="number" id="custom-timer-input"
                        class="flex-1 bg-slate-800 border border-slate-700 rounded-xl p-3 text-center text-white font-bold"
                        placeholder="Własny czas (sek)">
                    <button onclick="window.app.startCustom()"
                        class="bg-neutral-800 px-4 py-3 rounded-xl text-xs font-bold text-[#f97316] border border-[#f97316]/30">OK</button>
                </div>
                <div class="flex gap-4 w-full max-w-sm mx-auto">
                    <button id="timer-action" onclick="window.app.toggleTimer()"
                        class="flex-1 bg-[#f97316] py-5 rounded-2xl font-black text-white uppercase tracking-widest text-xs transition">Start</button>
                    <button onclick="window.app.resetTimer()"
                        class="bg-slate-800 border border-slate-700 px-6 py-4 rounded-2xl text-slate-400 font-bold transition">Reset</button>
                </div>
            </div>
        </div>

    </div>

    <script src="./src/data.js"></script>
    <script src="./src/store.js"></script>
    <script src="./src/timer.js"></script>
    <script src="./src/app.js"></script>
</body>

</html>
